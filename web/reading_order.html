<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-Men Krakoa → Atual | Ordem de Leitura</title>
  <meta name="description"
    content="Ordem de leitura interativa completa dos X-Men: Era Krakoa, From the Ashes e Shadows of Tomorrow">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a2e;
      --border: #2a2a3e;
      --text: #e0e0f0;
      --text2: #8888aa;
      --accent: #f0c040;
      --danger: #e04060;
      --glow: rgba(240, 192, 64, .15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 40px 20px 30px;
      position: relative
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent)
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f0c040, #e04060, #8040e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px
    }

    .subtitle {
      color: var(--text2);
      margin-top: 8px;
      font-size: .95rem
    }

    /* STATS BAR */
    .stats {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 24px 0
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 22px;
      text-align: center;
      min-width: 130px
    }

    .stat .num {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent)
    }

    .stat .label {
      font-size: .75rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px
    }

    .stat.danger .num {
      color: var(--danger)
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
      align-items: center;
      justify-content: center
    }

    .controls select,
    .controls input {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: .85rem;
      font-family: inherit;
      outline: none;
      transition: border .2s
    }

    .controls select:focus,
    .controls input:focus {
      border-color: var(--accent)
    }

    .controls input {
      width: 220px
    }

    .btn {
      background: linear-gradient(135deg, #f0c040, #e09030);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-weight: 600;
      font-size: .85rem;
      cursor: pointer;
      font-family: inherit;
      transition: transform .15s, box-shadow .15s
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(240, 192, 64, .3)
    }

    .btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border)
    }

    /* PROGRESS BAR */
    .progress-wrap {
      margin: 20px auto;
      max-width: 600px
    }

    .progress-bar {
      height: 8px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      position: relative
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #40e080, #f0c040, #e04060);
      border-radius: 4px;
      transition: width .5s ease
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: .75rem;
      color: var(--text2)
    }

    /* PHASE SECTIONS */
    .phase-section {
      margin: 30px 0
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      transition: background .2s
    }

    .phase-header:hover {
      background: var(--surface2)
    }

    .phase-header .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .phase-header h2 {
      font-size: 1rem;
      font-weight: 600;
      flex: 1
    }

    .phase-header .count {
      font-size: .8rem;
      color: var(--text2);
      background: var(--surface2);
      padding: 2px 10px;
      border-radius: 20px
    }

    .phase-header .arrow {
      font-size: 1.2rem;
      color: var(--text2);
      transition: transform .3s
    }

    .phase-header.open .arrow {
      transform: rotate(180deg)
    }

    /* ISSUE GRID */
    .issues-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
      padding: 12px 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height .4s ease, opacity .3s;
      opacity: 0
    }

    .issues-grid.open {
      max-height: none;
      opacity: 1
    }

    .issue-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden
    }

    .issue-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .4)
    }

    .issue-card.read {
      opacity: .45
    }

    .issue-card.read::after {
      content: '✓';
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: #40e080;
      font-weight: 700;
      font-size: 1.1rem
    }

    .issue-card.bookmark {
      border-color: var(--danger) !important;
      box-shadow: 0 0 20px rgba(224, 64, 96, .3) !important;
      animation: pulse 2s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(224, 64, 96, .2)
      }

      50% {
        box-shadow: 0 0 30px rgba(224, 64, 96, .5)
      }
    }

    .issue-card .series-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .issue-card .issue-info {
      flex: 1;
      min-width: 0
    }

    .issue-card .issue-title {
      font-size: .8rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .issue-card .issue-num {
      font-size: .7rem;
      color: var(--text2)
    }

    .issue-card .order-badge {
      font-size: .65rem;
      color: var(--text2);
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 10px;
      flex-shrink: 0
    }

    .issue-card .read-link {
      font-size: .85rem;
      text-decoration: none;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(64, 160, 224, .2);
      color: #40a0e0;
      flex-shrink: 0;
      transition: all .15s;
      z-index: 2
    }

    .issue-card .read-link:hover {
      background: rgba(64, 160, 224, .4);
      transform: scale(1.15)
    }

    /* EVENT TAG */
    .event-banner {
      grid-column: 1/-1;
      padding: 8px 16px;
      background: linear-gradient(90deg, var(--surface2), transparent);
      border-left: 3px solid var(--accent);
      font-size: .8rem;
      font-weight: 600;
      color: var(--accent);
      border-radius: 4px;
      margin: 4px 0
    }

    /* BOOKMARK BANNER */
    .bookmark-banner {
      grid-column: 1/-1;
      padding: 12px 20px;
      background: linear-gradient(90deg, rgba(224, 64, 96, .15), transparent);
      border: 1px solid var(--danger);
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      color: var(--danger);
      font-size: .9rem;
      margin: 8px 0;
      animation: pulse 2s infinite
    }

    /* TOOLTIP */
    .tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: .8rem;
      pointer-events: none;
      z-index: 1000;
      max-width: 280px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .6);
      opacity: 0;
      transition: opacity .15s
    }

    .tooltip.show {
      opacity: 1
    }

    .tooltip .tt-title {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px
    }

    .tooltip .tt-phase {
      color: var(--text2);
      font-size: .7rem
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px
    }

    @media(max-width:600px) {
      h1 {
        font-size: 1.6rem
      }

      .stats {
        gap: 8px
      }

      .stat {
        min-width: 100px;
        padding: 10px 14px
      }

      .stat .num {
        font-size: 1.3rem
      }

      .issues-grid {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

    function populateFilters() {
      const phases = [...new Set(data.issues.map(i => i.phase))];
      const series = [...new Set(data.issues.map(i => i.title))].sort();
      const pSel = document.getElementById('filterPhase');
      const sSel = document.getElementById('filterSeries');
      phases.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; pSel.appendChild(o); });
      series.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sSel.appendChild(o); });
    }

    function getFilteredIssues() {
      const phase = document.getElementById('filterPhase').value;
      const series = document.getElementById('filterSeries').value;
      const search = document.getElementById('searchBox').value.toLowerCase();
      return data.issues.filter(i => {
        if (phase && i.phase !== phase) return false;
        if (series && i.title !== series) return false;
        if (search && !(i.title.toLowerCase().includes(search) || String(i.issue).includes(search) || (i.event || '').toLowerCase().includes(search))) return false;
        return true;
      });
    }

    function render() {
      const issues = getFilteredIssues();
      const totalAll = data.issues.length;
      const readCount = data.issues.filter(i => isRead(i.order)).length;
      const bmOrder = getBookmarkOrder();
      const unread = totalAll - readCount;

      // Stats
      document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${totalAll}</div><div class="label">Total de Edições</div></div>
    <div class="stat"><div class="num">${readCount}</div><div class="label">Lidas</div></div>
    <div class="stat danger"><div class="num">${unread}</div><div class="label">Faltam</div></div>
    <div class="stat"><div class="num">${Math.round(readCount / totalAll * 100)}%</div><div class="label">Progresso</div></div>
  `;

      // Progress
      document.getElementById('progressFill').style.width = (readCount / totalAll * 100) + '%';
      document.getElementById('progressRead').textContent = `${readCount} lidas`;
      document.getElementById('progressTotal').textContent = `${totalAll} total`;

      // Group by phase
      const phases = [];
      let currentPhase = null;
      issues.forEach(issue => {
        if (!currentPhase || currentPhase.name !== issue.phase) {
          currentPhase = { name: issue.phase, issues: [] };
          phases.push(currentPhase);
        }
        currentPhase.issues.push(issue);
      });

      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';

      phases.forEach((phase, pi) => {
        const section = document.createElement('div');
        section.className = 'phase-section';
        const phaseColor = getSeriesColor(phase.name);
        const readInPhase = phase.issues.filter(i => isRead(i.order)).length;

        const header = document.createElement('div');
        header.className = 'phase-header open';
        header.innerHTML = `
      <div class="dot" style="background:${phaseColor}"></div>
      <h2>${phase.name}</h2>
      <span class="count">${readInPhase}/${phase.issues.length}</span>
      <span class="arrow">▼</span>
    `;

        const grid = document.createElement('div');
        grid.className = 'issues-grid open';

        let lastEvent = '';
        phase.issues.forEach(issue => {
          const isBookmark = (issue.order === bmOrder);
          if (isBookmark) {
            const banner = document.createElement('div');
            banner.className = 'bookmark-banner';
            banner.id = 'bookmark-marker';
            banner.textContent = `📍 PRÓXIMA LEITURA — ${issue.title} #${issue.issue}`;
            grid.appendChild(banner);
          }
          if (issue.event && issue.event !== lastEvent) {
            lastEvent = issue.event;
            const eb = document.createElement('div');
            eb.className = 'event-banner';
            eb.textContent = '⚡ ' + issue.event;
            grid.appendChild(eb);
          } else if (!issue.event && lastEvent) {
            lastEvent = '';
          }

          const card = document.createElement('div');
          card.className = 'issue-card' + (isRead(issue.order) ? ' read' : '') + (isBookmark ? ' bookmark' : '');
          const sc = getSeriesColor(issue.title);
          const readUrl = getReadUrl(issue);
          card.innerHTML = `
        <div class="series-dot" style="background:${sc}"></div>
        <div class="issue-info">
          <div class="issue-title">${issue.title}</div>
          <div class="issue-num">#${issue.issue}${issue.year ? ' • ' + issue.year : ''}</div>
        </div>
        <a class="read-link" href="${readUrl}" target="_blank" title="Ler online">📖</a>
        <div class="order-badge">${issue.order}</div>
      `;
          card.querySelector('.read-link').addEventListener('click', e => e.stopPropagation());
          card.addEventListener('click', () => toggleRead(issue.order));
          card.addEventListener('mouseenter', e => showTooltip(e, issue));
          card.addEventListener('mouseleave', hideTooltip);
          grid.appendChild(card);
        });

        header.addEventListener('click', () => {
          header.classList.toggle('open');
          grid.classList.toggle('open');
        });

        section.appendChild(header);
        section.appendChild(grid);
        timeline.appendChild(section);
      });
    }

    function showTooltip(e, issue) {
      const tt = document.getElementById('tooltip');
      tt.querySelector('.tt-title').textContent = `${issue.title} #${issue.issue}`;
      tt.querySelector('.tt-phase').textContent = `${issue.phase}${issue.event ? ' • ' + issue.event : ''} • #${issue.order} na ordem • ${isRead(issue.order) ? '✓ Lida' : '✗ Não lida'}`;
      tt.classList.add('show');
      const x = Math.min(e.clientX + 15, window.innerWidth - 300);
      const y = Math.min(e.clientY + 15, window.innerHeight - 80);
      tt.style.left = x + 'px';
      tt.style.top = y + 'px';
    }
    function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

    function jumpToBookmark() {
      const el = document.getElementById('bookmark-marker');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function markAllBeforeBookmark() {
      const bmOrd = getBookmarkOrder();
      if (!bmOrd) return;
      data.issues.forEach(i => { if (i.order < bmOrd) readState[i.order] = true; });
      saveRead();
      render();
    }

    function clearFiltered() {
      const filtered = getFilteredIssues();
      if (!filtered.length) return;
      if (!confirm(`Apagar progresso de ${filtered.length} edição(ões) filtrada(s)?`)) return;
      filtered.forEach(i => { delete readState[i.order]; });
      saveRead();
      render();
    }

    init();
  </script>
